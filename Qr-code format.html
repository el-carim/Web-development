<head>
   <title>QR-Code Format</title>
   <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Outfit', sans-serif;
    background-color: hsl(197, 49%, 72%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

.qr-card {
    background-color: white;
    max-width: 350px;
    width: 100%;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    box-sizing: border-box;
}

.qr-card img {
    width: 100%;
    height: auto;
    border-radius: 10px;
}

.qr-card h1 {
    color: hsl(218, 44%, 22%);
    font-size: 1.5rem;
    margin: 20px 0 10px 0;
}

.qr-card h2 {
    color: hsl(216, 15%, 48%);
    font-size: 1rem;
    margin: 10px 0;
    font-weight: 400;
}

@media (max-width: 480px) {
    .qr-card {
        padding: 20px;
    }
    .qr-card h1 {
        font-size: 1.25rem;
    }
    .qr-card h2 {
        font-size: 0.9rem;
    }
}
</style>
</head>

<body>

   <div class="qr-card">
     <img src="qr-code-component-main/qr-code-component-main/images/image-qr-code.png" alt="QR Code">
    <h1>Improve your front-end skills by building projects</h1>
    <h2>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</h2>
   </div>

</body>
