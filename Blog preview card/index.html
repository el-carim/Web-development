<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog preview card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;800&display=swap" rel="stylesheet">
</head>
<body>
    <main class="card">
        <img src="blog-preview-card-main/assets/images/illustration-article.svg" alt="Article illustration" class="card-image">
        
        <div class="card-content">
            <span class="badge">Learning</span>
            <p class="date">Published 21 Dec 2023</p>
           <a href="">
             <h1>HTML & CSS foundations</h1> </a>
            <p class="description">These languages are the backbone of every website, defining structure, content and presentation.</p>
        </div>
        
        <div class="author">
            <img src="blog-preview-card-main/assets/images/image-avatar.webp" alt="Greg Hooper" class="author-image">
            <strong class="author-name">Greg Hooper</strong>
        </div>
    </main>
</body>
</html>
